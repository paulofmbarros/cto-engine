name: Daily CTO Snapshot (Example)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build CtoEngine.slnx
      - name: Run snapshot
        run: dotnet run --project src/Cto.Cli -- snapshot --project ./projects/my-product
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      - name: Commit snapshot changes
        run: |
          git config user.name "CTO Engine Bot"
          git config user.email "cto-engine-bot@example.com"
          git add projects/my-product/.cto-engine/snapshot.json
          git diff --cached --quiet || git commit -m "chore: daily snapshot"
          git push

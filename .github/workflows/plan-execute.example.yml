name: Plan Execute (Example)

on:
  push:
    paths:
      - 'projects/**/plan.yaml'
      - 'projects/**/.cto-engine/challenge-log.yaml'

jobs:
  validate-and-execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: make build
      - name: Validate
        run: make validate PROJECT=./projects/my-product TARGET=all
      - name: Execute
        run: make execute PROJECT=./projects/my-product
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
